<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom DevTools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<style>
/* ═══════════════════════════════════════════════════════════════
   PHANTOM DEVTOOLS — Firefox DevTools faithful clone
   Dark industrial, monospace-driven, pixel-precise
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #1a1a1e;
  --bg1: #212126;
  --bg2: #28282e;
  --bg3: #2e2e36;
  --bg4: #35353f;
  --bg-hover: #3a3a45;
  --border: #3d3d4a;
  --border-light: #4a4a58;
  --text0: #e8e8f0;
  --text1: #b8b8cc;
  --text2: #888899;
  --text3: #555566;
  --accent: #0088ff;
  --accent2: #00c8d4;
  --tag: #e36b4f;
  --attr: #6fb3d2;
  --val: #a5c261;
  --str: #a5c261;
  --num: #d19a66;
  --bool: #c678dd;
  --null: #888899;
  --fn: #e5c07b;
  --warn-bg: #2a2200;
  --warn-text: #e8c56a;
  --warn-border: #554400;
  --err-bg: #2a1010;
  --err-text: #f47878;
  --err-border: #551818;
  --info-bg: #001a2a;
  --info-text: #6fb3d2;
  --info-border: #003355;
  --log-bg: transparent;
  --sel-bg: #1a3a5c;
  --sel-border: #0088ff;
  --highlight: rgba(0,136,255,0.15);
  --hl-outline: rgba(0,136,255,0.6);
  --match-bg: rgba(255,200,0,0.2);
  --match-outline: rgba(255,200,0,0.7);
  --radius: 3px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-ui: 'IBM Plex Sans', system-ui, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--text0);
  font-family: var(--font-ui);
  font-size: 13px;
  overflow: hidden;
}

/* ── LAYOUT ───────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 36px 1fr;
  grid-template-columns: 1fr 600px;
  height: 100vh;
  gap: 0;
}

#topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
}

#logo {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 12px;
  color: var(--accent2);
  letter-spacing: 0.08em;
  margin-right: 6px;
}

#url-bar {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 8px;
  outline: none;
  transition: border-color 0.15s;
}
#url-bar:focus { border-color: var(--accent); }

#nav-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  font-size: 11px;
  font-family: var(--font-ui);
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.1s;
}
#nav-btn:hover { background: var(--bg4); color: var(--text0); }

#page-title {
  font-size: 11px;
  color: var(--text2);
  font-family: var(--font-mono);
  min-width: 80px;
}

/* ── PREVIEW PANE ─────────────────────────────────────────── */
#preview-pane {
  background: #fff;
  border-right: 2px solid var(--border);
  position: relative;
  overflow: hidden;
}

#preview-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

#pick-cursor {
  position: absolute;
  inset: 0;
  cursor: crosshair;
  z-index: 10;
  display: none;
  background: transparent;
}

/* ── DEVTOOLS PANEL ───────────────────────────────────────── */
#devtools {
  display: grid;
  grid-template-rows: 34px 1fr;
  background: var(--bg1);
  overflow: hidden;
}

/* ── TABS ─────────────────────────────────────────────────── */
#tabs {
  display: flex;
  align-items: stretch;
  background: var(--bg0);
  border-bottom: 1px solid var(--border);
  padding: 0 4px;
  gap: 0;
}

.tab {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 400;
  color: var(--text2);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 0 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.1s;
  position: relative;
  margin-bottom: -1px;
}
.tab:hover { color: var(--text0); }
.tab.active {
  color: var(--text0);
  border-bottom-color: var(--accent);
  background: var(--bg1);
}
.tab .badge {
  background: var(--err-bg);
  color: var(--err-text);
  border-radius: 8px;
  font-size: 9px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
}
.tab .badge.warn { background: var(--warn-bg); color: var(--warn-text); }

#tabs-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  padding-right: 4px;
}

.icon-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  padding: 3px 7px;
  font-family: var(--font-ui);
  transition: all 0.1s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.icon-btn:hover { background: var(--bg4); color: var(--text0); border-color: var(--border); }
.icon-btn.active { background: rgba(0,136,255,0.15); color: var(--accent); border-color: rgba(0,136,255,0.4); }
.icon-btn svg { width: 12px; height: 12px; fill: currentColor; }

/* ── PANEL CONTENT ────────────────────────────────────────── */
#panels { overflow: hidden; display: flex; flex-direction: column; }
.panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.panel.active { display: flex; }

/* ═══════════════════════════════════════════════════════════
   INSPECTOR PANEL
═══════════════════════════════════════════════════════════ */
#inspector-panel {
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#inspector-panel.active { display: flex; }

/* Selector bar */
#selector-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 6px 8px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

#css-selector-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text0);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  transition: border-color 0.15s;
}
#css-selector-input:focus { border-color: var(--accent); }
#css-selector-input.invalid { border-color: var(--err-text); color: var(--err-text); }
#css-selector-input.valid { border-color: var(--val); }

#selector-match-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  min-width: 60px;
}

#pick-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text1);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-ui);
  padding: 4px 8px;
  transition: all 0.1s;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
#pick-btn:hover { background: var(--bg4); }
#pick-btn.active { background: rgba(0,136,255,0.2); color: var(--accent); border-color: var(--accent); }

/* Inspector split */
#inspector-body {
  display: grid;
  grid-template-rows: 1fr 1px 220px;
  flex: 1;
  overflow: hidden;
}

#dom-tree-pane {
  overflow-y: auto;
  overflow-x: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}

#inspector-divider {
  background: var(--border);
  cursor: row-resize;
  position: relative;
}
#inspector-divider:hover { background: var(--accent); }

#styles-pane {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

#computed-styles {
  border-right: 1px solid var(--border);
  padding: 0;
  overflow-y: auto;
}

#box-model-pane {
  padding: 12px;
  overflow-y: auto;
}

.styles-header {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  padding: 6px 10px 4px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 1;
}

.style-rule {
  display: flex;
  padding: 2px 10px;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.7;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  cursor: default;
  transition: background 0.08s;
}
.style-rule:hover { background: var(--bg-hover); }
.style-prop { color: var(--attr); flex-shrink: 0; }
.style-val { color: var(--val); word-break: break-all; }
.style-val.color-swatch::before {
  content: '';
  display: inline-block;
  width: 9px;
  height: 9px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
  border: 1px solid rgba(255,255,255,0.2);
  background: var(--swatch-color);
}

/* Box model */
#box-model-title {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  margin-bottom: 10px;
}

#box-diagram {
  position: relative;
  width: 100%;
  max-width: 220px;
  margin: 0 auto;
}

.box-layer {
  border: 1px solid;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.box-layer .box-label {
  position: absolute;
  top: 3px;
  left: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  opacity: 0.7;
  text-transform: lowercase;
}
.box-layer .box-val {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  text-align: center;
  line-height: 1.4;
}

.box-margin   { border-color: #9e7b52; background: rgba(158,123,82,0.12); color: #c9a87a; padding: 14px; }
.box-border   { border-color: #6b8e6b; background: rgba(107,142,107,0.12); color: #8ab88a; padding: 14px; }
.box-padding  { border-color: #5b8a9e; background: rgba(91,138,158,0.12); color: #7ab4d0; padding: 14px; }
.box-content  { border-color: var(--accent); background: rgba(0,136,255,0.1); color: var(--accent); padding: 12px; min-height: 40px; }

.box-sides {
  display: flex;
  justify-content: space-between;
  position: absolute;
  top: 50%;
  left: 4px;
  right: 4px;
  transform: translateY(-50%);
  pointer-events: none;
}

/* DOM tree nodes */
.dom-row {
  display: flex;
  align-items: baseline;
  padding: 1px 0;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid transparent;
  border-radius: 2px;
  transition: background 0.06s;
}
.dom-row:hover { background: var(--bg4); }
.dom-row.selected { background: var(--sel-bg); border-color: var(--sel-border); }
.dom-row.highlighted { outline: 1px solid var(--match-outline); background: var(--match-bg); }

.dom-indent { display: inline-block; }
.dom-toggle {
  display: inline-block;
  width: 14px;
  text-align: center;
  color: var(--text3);
  font-size: 9px;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.1s;
  user-select: none;
}
.dom-toggle.open { transform: rotate(90deg); }

.dom-tag-open { color: var(--tag); }
.dom-tag-close { color: var(--tag); opacity: 0.6; }
.dom-attr-name { color: var(--attr); }
.dom-attr-val { color: var(--val); }
.dom-text-node { color: var(--text2); font-style: italic; }
.dom-comment { color: var(--text3); font-style: italic; }

.dom-children { display: none; }
.dom-children.open { display: block; }

.breadcrumb {
  background: var(--bg0);
  border-top: 1px solid var(--border);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.breadcrumb span { color: var(--tag); }
.breadcrumb .sep { color: var(--text3); margin: 0 3px; }

/* ═══════════════════════════════════════════════════════════
   CONSOLE PANEL
═══════════════════════════════════════════════════════════ */
#console-panel {
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#console-panel.active { display: flex; }

#console-toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-ui);
  padding: 2px 8px;
  transition: all 0.1s;
}
.filter-btn:hover { background: var(--bg4); color: var(--text0); }
.filter-btn.on { border-color: var(--border-light); background: var(--bg4); color: var(--text0); }
.filter-btn.warn.on { border-color: var(--warn-border); color: var(--warn-text); background: var(--warn-bg); }
.filter-btn.error.on { border-color: var(--err-border); color: var(--err-text); background: var(--err-bg); }
.filter-btn.info.on { border-color: var(--info-border); color: var(--info-text); background: var(--info-bg); }

#console-filter-text {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text0);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 7px;
  outline: none;
  width: 130px;
  flex-shrink: 0;
  transition: border-color 0.15s;
}
#console-filter-text:focus { border-color: var(--accent); }

.toolbar-sep { width: 1px; background: var(--border); height: 16px; flex-shrink: 0; }

#msg-count { font-size: 11px; color: var(--text3); margin-left: auto; font-family: var(--font-mono); }

/* Log area */
#log-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.log-entry {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  grid-template-rows: auto auto;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.55;
  cursor: pointer;
  position: relative;
  transition: background 0.05s;
}
.log-entry:hover { background: var(--bg4); }
.log-entry.log   { background: var(--log-bg); }
.log-entry.warn  { background: var(--warn-bg); border-color: var(--warn-border); }
.log-entry.error { background: var(--err-bg); border-color: var(--err-border); }
.log-entry.info  { background: var(--info-bg); border-color: var(--info-border); }
.log-entry.debug { opacity: 0.65; }

.log-gutter {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 5px;
  color: var(--text3);
  font-size: 9px;
}
.log-entry.warn  .log-gutter { color: var(--warn-text); }
.log-entry.error .log-gutter { color: var(--err-text); }
.log-entry.info  .log-gutter { color: var(--info-text); }

.log-expand {
  grid-column: 1;
  grid-row: 1;
  cursor: pointer;
  color: var(--text3);
  font-size: 9px;
  padding: 5px 0 0 5px;
  transition: transform 0.12s;
  user-select: none;
}
.log-expand.open { transform: rotate(90deg); color: var(--text1); }
.log-expand:hover { color: var(--text0); }

.log-body {
  grid-column: 2;
  grid-row: 1;
  padding: 4px 6px 4px 2px;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.log-time {
  grid-column: 3;
  grid-row: 1;
  padding: 5px 8px 0 0;
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
}

.log-stack {
  grid-column: 1 / -1;
  grid-row: 2;
  display: none;
  padding: 0 8px 6px 20px;
  border-top: 1px solid rgba(255,255,255,0.04);
  background: rgba(0,0,0,0.2);
}
.log-stack.open { display: block; }

.stack-frame {
  display: flex;
  gap: 8px;
  padding: 2px 0;
  font-size: 11px;
  line-height: 1.5;
}
.stack-fn { color: var(--fn); }
.stack-at { color: var(--text3); }
.stack-loc { color: var(--accent); text-decoration: underline; text-decoration-style: dotted; cursor: pointer; }
.stack-loc:hover { color: var(--accent2); }

/* Value rendering */
.v-string { color: var(--str); }
.v-string::before { content: '"'; }
.v-string::after  { content: '"'; }
.v-number { color: var(--num); }
.v-boolean { color: var(--bool); }
.v-null { color: var(--null); font-style: italic; }
.v-undefined { color: var(--null); font-style: italic; }
.v-function { color: var(--fn); }
.v-tag { color: var(--tag); }
.v-error { color: var(--err-text); }
.v-key { color: var(--attr); }
.v-punct { color: var(--text3); }
.v-expand-toggle { color: var(--accent); cursor: pointer; }
.v-expand-toggle:hover { text-decoration: underline; }

/* Console REPL */
#console-repl {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  flex-shrink: 0;
  min-height: 34px;
}
#console-repl-prefix {
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 13px;
  flex-shrink: 0;
  user-select: none;
}
#repl-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text0);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  padding: 6px 0;
}
#repl-run {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-ui);
  padding: 3px 10px;
  font-weight: 500;
  transition: background 0.1s;
}
#repl-run:hover { background: #0073d9; }

/* Syntax highlight overrides for Prism inside console */
.log-body code[class*="language-"], .log-body pre[class*="language-"] {
  background: transparent;
  font-family: var(--font-mono);
  font-size: 12px;
  text-shadow: none;
  padding: 0;
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}
.token.string { color: var(--str); }
.token.number { color: var(--num); }
.token.boolean { color: var(--bool); }
.token.keyword { color: var(--bool); }
.token.function { color: var(--fn); }
.token.punctuation { color: var(--text3); }
.token.property { color: var(--attr); }
.token.operator { color: var(--text1); }
.token.comment { color: var(--text3); font-style: italic; }

/* Scrollbar uniform */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--bg0);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  color: var(--text1);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 8px;
  pointer-events: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.1s;
  white-space: nowrap;
}
.tooltip.show { opacity: 1; }

/* Resizer */
#panel-resizer {
  background: var(--border);
  cursor: col-resize;
  width: 2px;
  grid-row: 2;
  transition: background 0.1s;
  z-index: 5;
}
#panel-resizer:hover { background: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span id="logo">⬡ PHANTOM</span>

// ── Iframe bridge ──────────────────────────────────────────────────
function injectBridge() {
  const iwin = iframe.contentWindow;
  if (!iwin) return;
  // Override console methods in iframe
  const bridgeScript = iwin.document.createElement('script');
  bridgeScript.textContent = `
(function(){
  if(window.__phantomBridged) return;
  window.__phantomBridged = true;
  const METHODS = ['log','warn','error','info','debug','table','dir','assert','clear','count','time','timeEnd','group','groupEnd'];
  const orig = {};
  function getStack(){
    try{ throw new Error(); }catch(e){
      return (e.stack||'').split('\\n').slice(3).filter(l=>l.trim()).slice(0,8).map(line=>{
        const m = line.match(/at\\s+(.+?)\\s+\\((.+?):(\\d+):(\\d+)\\)/) ||
                  line.match(/at\\s+(.+?):(\\d+):(\\d+)/) ||
                  line.match(/(.+?)@(.+?):(\\d+):(\\d+)/);
        if(!m) return {fn:line.trim(),file:'',line:'',col:''};
        if(m.length===5) return {fn:m[1],file:m[2].split('/').slice(-2).join('/'),line:m[3],col:m[4]};
        return {fn:m[1],file:m[1].split('/').slice(-2).join('/'),line:m[2],col:m[3]};
      });
    }
  }
  function ser(v,d){
    if(d===undefined)d=0;
    if(v===null)return{t:'null',v:'null'};
    if(v===undefined)return{t:'undefined',v:'undefined'};
    if(typeof v==='string')return{t:'string',v:v.slice(0,800)};
    if(typeof v==='number')return{t:'number',v:v};
    if(typeof v==='boolean')return{t:'boolean',v:v};
    if(typeof v==='function')return{t:'function',v:'ƒ '+(v.name||'anonymous')+'()'};
    if(v instanceof Error)return{t:'error',v:v.message,stack:v.stack};
    if(v instanceof Element)return{t:'element',v:'<'+v.tagName.toLowerCase()+(v.id?'#'+v.id:'')+'>'};
    if(Array.isArray(v)){
      if(d>1)return{t:'array',v:'Array('+v.length+')',len:v.length};
      return{t:'array',v:v.slice(0,30).map(x=>ser(x,d+1)),len:v.length};
    }
    if(typeof v==='object'){
      if(d>1)return{t:'object',v:'[Object]'};
      try{
        const keys=Object.keys(v).slice(0,30);
        const e={};
        keys.forEach(k=>{e[k]=ser(v[k],d+1);});
        return{t:'object',v:e,len:Object.keys(v).length};
      }catch(e){return{t:'object',v:'[Object]'};}
    }
    return{t:'primitive',v:String(v)};
  }
  METHODS.forEach(m=>{
    orig[m]=console[m]?console[m].bind(console):()=>{};
    console[m]=function(...args){
      orig[m](...args);
      try{
        window.parent.postMessage({
          __phantom:true,method:m,
          args:args.map(a=>ser(a)),
          stack:getStack(),
          time:Date.now()
        },'*');
      }catch(e){}
    };
  });
  window.addEventListener('error',e=>{
    window.parent.postMessage({
      __phantom:true,method:'error',
      args:[{t:'error',v:(e.error?e.error.message:e.message)}],
      stack:[{fn:'(global)',file:(e.filename||'').split('/').slice(-1)[0],line:String(e.lineno),col:String(e.colno)}],
      time:Date.now()
    },'*');
  },true);
  window.addEventListener('unhandledrejection',e=>{
    window.parent.postMessage({
      __phantom:true,method:'error',
      args:[{t:'error',v:'Unhandled Promise Rejection: '+(e.reason&&e.reason.message||String(e.reason))}],
      stack:getStack(),
      time:Date.now()
    },'*');
  },true);
  // Network intercept
  const oFetch=window.fetch;
  window.fetch=async function(...a){
    const url=typeof a[0]==='string'?a[0]:(a[0]&&a[0].url)||String(a[0]);
    const method=(a[1]&&a[1].method)||'GET';
    const id=Math.random().toString(36).slice(2);
    const t0=performance.now();
    window.parent.postMessage({__phantom:true,method:'__net',event:'req',id,url,method,time:Date.now()},'*');
    try{
      const r=await oFetch.apply(this,a);
      window.parent.postMessage({__phantom:true,method:'__net',event:'res',id,url,method,status:r.status,duration:Math.round(performance.now()-t0),time:Date.now()},'*');
      return r;
    }catch(e){
      window.parent.postMessage({__phantom:true,method:'__net',event:'err',id,url,method,error:e.message,duration:Math.round(performance.now()-t0),time:Date.now()},'*');
      throw e;
    }
  };
})();
`;
  iwin.document.head.appendChild(bridgeScript);
}

// Load demo into iframe
function loadDemo() {
  iframe.srcdoc = DEMO_PAGE;
  iframe.onload = () => {
    state.iframeReady = true;
    setTimeout(() => {
      injectBridge();
      buildDOMTree();
    }, 100);
  };
}

// Listen for messages from iframe
window.addEventListener('message', (e) => {
  if (!e.data || !e.data.__phantom) return;
  const { method, args, stack, time, event, url, status, duration } = e.data;

  if (method === '__net') {
    // Network log via console message
    if (event === 'req') addLog('info', [{t:'string',v:`→ fetch ${e.data.method} ${url}`}], [], time);
    if (event === 'res') addLog('info', [{t:'string',v:`← ${status} ${url} (${duration}ms)`}], [], time);
    if (event === 'err') addLog('error', [{t:'error',v:`✕ fetch failed: ${e.data.error} ${url}`}], [], time);
    return;
  }

  if (method === 'clear') { clearConsole(); return; }
  addLog(method, args, stack || [], time);
});

// Navigate
function navigate() {
  const url = $('url-bar').value.trim();
  if (!url || url === 'about:devtools-demo') { loadDemo(); return; }
  try {
    new URL(url);
    iframe.src = url;
    iframe.onload = () => {
      state.iframeReady = true;
      setTimeout(() => { injectBridge(); buildDOMTree(); }, 300);
    };
  } catch {
    addLog('error', [{t:'error',v:'Invalid URL: ' + url}], [], Date.now());
  }
}

  btn.classList.add('active');

  if (panel) {
    panel.classList.add('active');
    if (name === 'inspector') buildDOMTree();
  }
}

// ── Console ────────────────────────────────────────────────────────
function ts(ms) {
  const d = new Date(ms || Date.now());
  return d.toTimeString().slice(0,8) + '.' + String(d.getMilliseconds()).padStart(3,'0');
}

function addLog(method, args, stack, time) {
  const type = ['log','warn','error','info','debug','table','dir','assert','count','time','timeEnd','group','groupEnd'].includes(method) ? method : 'log';
  const normType = type === 'warn' ? 'warn' : type === 'error' ? 'error' : type === 'info' ? 'info' : type === 'debug' ? 'debug' : 'log';

  const entry = { id: Math.random().toString(36).slice(2), type: normType, args, stack, time: time || Date.now() };
  state.logs.push(entry);

  if (normType === 'error') {
    state.errCount++;
    errBadge.style.display = '';
    errBadge.textContent = state.errCount;
  }
  if (normType === 'warn') {
    state.warnCount++;
    warnBadge.style.display = '';
    warnBadge.textContent = state.warnCount;
  }

  renderLogEntry(entry, true);
  updateMsgCount();
}

function renderLogEntry(entry, scroll) {
  const { type, args, stack, time } = entry;
  if (state.filter !== 'all' && state.filter !== type) return;
  if (state.textFilter) {
    const flat = argsToPlainText(args).toLowerCase();
    if (!flat.includes(state.textFilter.toLowerCase())) return;
  }

  const div = document.createElement('div');
  div.className = `log-entry ${type}`;
  div.dataset.id = entry.id;

  const hasStack = stack && stack.length > 0;

  // Gutter / expand
  const expand = document.createElement('div');
  expand.className = 'log-expand';
  expand.textContent = hasStack ? '▶' : ' ';
  if (hasStack) {
    expand.onclick = (e) => { e.stopPropagation(); toggleStack(div, expand); };
  }
  div.appendChild(expand);

  // Body
  const body = document.createElement('div');
  body.className = 'log-body';
  body.innerHTML = renderArgs(args, type);
  div.appendChild(body);

  // Time
  const timeEl = document.createElement('div');
  timeEl.className = 'log-time';
  timeEl.textContent = ts(time);
  div.appendChild(timeEl);

  // Stack trace
  if (hasStack) {
    const stackDiv = document.createElement('div');
    stackDiv.className = 'log-stack';
    stackDiv.innerHTML = stack.map(f => `
      <div class="stack-frame">
        <span class="stack-at">at</span>
        <span class="stack-fn">${esc(f.fn || '(anonymous)')}</span>
        ${f.file ? `<span class="stack-loc">${esc(f.file)}${f.line ? ':'+f.line : ''}${f.col ? ':'+f.col : ''}</span>` : ''}
      </div>`).join('');
    div.appendChild(stackDiv);
  }

  logArea.appendChild(div);
  if (scroll) logArea.scrollTop = logArea.scrollHeight;
}

function toggleStack(div, expand) {
  const stack = div.querySelector('.log-stack');
  if (!stack) return;
  const open = expand.classList.toggle('open');
  stack.classList.toggle('open', open);
}

function argsToPlainText(args) {
  return (args || []).map(a => {
    if (typeof a === 'string') return a;
    if (a && a.t) {
      if (a.t === 'string') return a.v;
      if (a.t === 'object' || a.t === 'array') return JSON.stringify(a.v);
      return String(a.v);
    }
    return String(a);
  }).join(' ');
}

function renderArgs(args, type) {
  if (!args || args.length === 0) return '';
  return args.map(a => renderValue(a)).join('<span class="v-punct"> </span>');
}

function renderValue(v, depth) {
  depth = depth || 0;
  if (!v || typeof v !== 'object') return esc(String(v));
  const { t, v: val, len } = v;

  if (t === 'null') return `<span class="v-null">null</span>`;
  if (t === 'undefined') return `<span class="v-undefined">undefined</span>`;
  if (t === 'string') return `<span class="v-string">${esc(val)}</span>`;
  if (t === 'number') return `<span class="v-number">${esc(String(val))}</span>`;
  if (t === 'boolean') return `<span class="v-boolean">${val}</span>`;
  if (t === 'function') return `<span class="v-function">${esc(val)}</span>`;
  if (t === 'element') return `<span class="v-tag">${esc(val)}</span>`;
  if (t === 'error') return `<span class="v-error">${esc(val)}</span>`;

  if (t === 'array') {
    if (depth > 1) return `<span class="v-punct">[</span><span class="v-null">Array(${len})</span><span class="v-punct">]</span>`;
    if (Array.isArray(val)) {
      const items = val.slice(0,10).map(i => renderValue(i, depth+1));
      const more = len > 10 ? `<span class="v-null">, …${len-10} more</span>` : '';
      return `<span class="v-punct">[</span>${items.join('<span class="v-punct">, </span>')}${more}<span class="v-punct">]</span>`;
    }
    return `<span class="v-null">${esc(String(val))}</span>`;
  }

  if (t === 'object') {
    if (depth > 1) return `<span class="v-punct">{…}</span>`;
    if (typeof val === 'object' && val !== null) {
      const entries = Object.entries(val).slice(0,6);
      const more = len > 6 ? `<span class="v-null">, …${len-6} more</span>` : '';
      const parts = entries.map(([k,v2]) =>
        `<span class="v-key">${esc(k)}</span><span class="v-punct">: </span>${renderValue(v2, depth+1)}`
      );
      return `<span class="v-punct">{</span>${parts.join('<span class="v-punct">, </span>')}${more}<span class="v-punct">}</span>`;
    }
    return `<span class="v-null">${esc(String(val))}</span>`;
  }

  return `<span class="v-null">${esc(String(val))}</span>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  state.filter = btn.dataset.f;
  rebuildLog();
}

function setTextFilter(val) {
  state.textFilter = val;
  rebuildLog();
}

function rebuildLog() {
  logArea.innerHTML = '';
  state.logs.forEach(e => renderLogEntry(e, false));
  updateMsgCount();
}

function updateMsgCount() {
  $('msg-count').textContent = state.logs.length + ' message' + (state.logs.length !== 1 ? 's' : '');
}

function clearConsole() {
  state.logs = [];
  state.errCount = 0;
  state.warnCount = 0;
  errBadge.style.display = 'none';
  warnBadge.style.display = 'none';
  logArea.innerHTML = '';
  updateMsgCount();
}

// REPL
function runRepl() {
  const code = replInput.value.trim();
  if (!code) return;
  state.replHistory.unshift(code);
  state.replIdx = -1;

  // Show input echo
  addLog('log', [{t:'string',v:'> ' + code}], [], Date.now());

  // Eval in iframe
  try {
    const iwin = iframe.contentWindow;
    const result = iwin.eval(code);
    const ser = serializeForDisplay(result);
    addLog('log', [ser], [], Date.now());
  } catch(e) {
    addLog('error', [{t:'error',v:e.message}], (e.stack||'').split('\n').slice(1,5).map(l=>({fn:l.trim(),file:'',line:'',col:''})), Date.now());
  }
  replInput.value = '';
}

function serializeForDisplay(v, depth) {
  depth = depth || 0;
  if (v === null) return {t:'null',v:'null'};
  if (v === undefined) return {t:'undefined',v:'undefined'};
  if (typeof v === 'string') return {t:'string',v:v};
  if (typeof v === 'number') return {t:'number',v:v};
  if (typeof v === 'boolean') return {t:'boolean',v:v};
  if (typeof v === 'function') return {t:'function',v:'ƒ '+(v.name||'anonymous')+'()'};
  if (v instanceof Error) return {t:'error',v:v.message};
  if (Array.isArray(v)) {
    if (depth > 1) return {t:'array',v:'Array('+v.length+')',len:v.length};
    return {t:'array',v:v.slice(0,20).map(i=>serializeForDisplay(i,depth+1)),len:v.length};
  }
  if (typeof v === 'object') {
    if (depth > 1) return {t:'object',v:'[Object]'};
    try {
      const keys = Object.keys(v).slice(0,20);
      const e = {};
      keys.forEach(k => { e[k] = serializeForDisplay(v[k], depth+1); });
      return {t:'object',v:e,len:Object.keys(v).length};
    } catch { return {t:'object',v:'[Object]'}; }
  }
  return {t:'primitive',v:String(v)};
}

function replKey(e) {
  if (e.key === 'Enter') { runRepl(); return; }
  if (e.key === 'ArrowUp') {
    state.replIdx = Math.min(state.replIdx + 1, state.replHistory.length - 1);
    replInput.value = state.replHistory[state.replIdx] || '';
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    state.replIdx = Math.max(state.replIdx - 1, -1);
    replInput.value = state.replIdx >= 0 ? state.replHistory[state.replIdx] : '';
    e.preventDefault();
  }
}

// ── DOM Tree ───────────────────────────────────────────────────────
function buildDOMTree() {
  if (!state.iframeReady) return;
  const idoc = iframe.contentDocument;
  if (!idoc) return;
  domTreePane.innerHTML = '';
  renderDOMNode(idoc.documentElement, domTreePane, 0);
}

function renderDOMNode(node, container, depth) {
  if (!node) return;

  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent.trim();
    if (!text || text.length < 2) return;
    const row = document.createElement('div');
    row.className = 'dom-row';
    row.style.paddingLeft = (depth * 14 + 6) + 'px';
    row.innerHTML = `<span class="dom-text-node">"${esc(text.slice(0,80))}${text.length>80?'…':''}"</span>`;
    row.onclick = () => selectNode(node, row);
    container.appendChild(row);
    return;
  }

  if (node.nodeType === Node.COMMENT_NODE) {
    const row = document.createElement('div');
    row.className = 'dom-row';
    row.style.paddingLeft = (depth * 14 + 6) + 'px';
    row.innerHTML = `<span class="dom-comment">&lt;!-- ${esc(node.textContent.trim().slice(0,60))} --&gt;</span>`;
    container.appendChild(row);
    return;
  }

  if (node.nodeType !== Node.ELEMENT_NODE) return;

  const tag = node.tagName.toLowerCase();
  const skip = [];
  if (skip.includes(tag)) return;

  const realChildren = Array.from(node.childNodes).filter(n => {
    if (n.nodeType === Node.TEXT_NODE) return n.textContent.trim().length > 1;
    return n.nodeType === Node.ELEMENT_NODE || n.nodeType === Node.COMMENT_NODE;
  });

  const hasChildren = realChildren.length > 0;

  // Build attribute string
  const attrs = Array.from(node.attributes || []).slice(0,6).map(a => {
    const cls = a.name === 'class' ? 'dom-attr-val' : 'dom-attr-val';
    return ` <span class="dom-attr-name">${esc(a.name)}</span>=<span class="dom-attr-val">"${esc(a.value.slice(0,60))}"</span>`;
  }).join('');

  const row = document.createElement('div');
  row.className = 'dom-row';
  row.style.paddingLeft = (depth * 14 + 6) + 'px';
  row._node = node;

  const toggle = document.createElement('span');
  toggle.className = 'dom-toggle';
  toggle.textContent = hasChildren ? '▶' : ' ';

  const tagOpen = document.createElement('span');
  tagOpen.innerHTML = `<span class="dom-tag-open">&lt;${tag}&gt;</span>${attrs}`;

  row.appendChild(toggle);
  row.appendChild(tagOpen);

  // Self-closing display
  if (!hasChildren) {
    const close = document.createElement('span');
    close.innerHTML = `<span class="dom-tag-close">&lt;/${tag}&gt;</span>`;
    row.appendChild(close);
  }

  container.appendChild(row);

  // Children container
  let childContainer = null;
  if (hasChildren) {
    childContainer = document.createElement('div');
    childContainer.className = 'dom-children';
    container.appendChild(childContainer);

    let built = false;

    toggle.onclick = (e) => {
      e.stopPropagation();
      const open = toggle.classList.toggle('open');
      childContainer.classList.toggle('open', open);
      if (open && !built) {
        built = true;
        realChildren.forEach(c => renderDOMNode(c, childContainer, depth + 1));
        // Closing tag
        const closeRow = document.createElement('div');
        closeRow.style.paddingLeft = (depth * 14 + 20) + 'px';
        closeRow.innerHTML = `<span class="dom-tag-close">&lt;/${tag}&gt;</span>`;
        closeRow.style.fontFamily = 'var(--font-mono)';
        closeRow.style.fontSize = '12px';
        childContainer.appendChild(closeRow);
      }
    };

    row.onclick = (e) => {
      if (e.target === toggle) return;
      toggle.click();
      selectNode(node, row);
    };
  } else {
    row.onclick = () => selectNode(node, row);
  }
}

function selectNode(node, rowEl) {
  // Deselect previous
  document.querySelectorAll('.dom-row.selected').forEach(r => r.classList.remove('selected'));
  if (rowEl) rowEl.classList.add('selected');
  state.selectedNode = node;

  if (node.nodeType !== Node.ELEMENT_NODE) {
    breadcrumb.innerHTML = '<span style="color:var(--text2)">Text node selected</span>';
    renderComputedStyles(null);
    renderBoxModel(null);
    return;
  }

  // Breadcrumb
  const path = [];
  let cur = node;
  while (cur && cur.tagName) {
    const id = cur.id ? '#'+cur.id : '';
    const cls = cur.className && typeof cur.className === 'string' ? '.'+cur.className.trim().split(/\s+/).slice(0,2).join('.') : '';
    path.unshift(`<span>${cur.tagName.toLowerCase()}${esc(id+cls)}</span>`);
    cur = cur.parentElement;
  }
  breadcrumb.innerHTML = path.join('<span class="sep"> › </span>');

  // Highlight in iframe
  try {
    const iwin = iframe.contentWindow;
    // Remove previous highlight
    const prev = iwin.document.querySelector('.__phantom_selected');
    if (prev) {
      prev.style.outline = prev.__origOutline || '';
      prev.classList.remove('__phantom_selected');
    }
    node.__origOutline = node.style.outline;
    node.style.outline = '2px solid #0088ff';
    node.classList.add('__phantom_selected');
    node.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } catch(e) {}

  renderComputedStyles(node);
  renderBoxModel(node);
}

// ── Computed Styles ────────────────────────────────────────────────
const IMPORTANT_PROPS = [
  'display','position','width','height','min-width','max-width','min-height','max-height',
  'margin','margin-top','margin-right','margin-bottom','margin-left',
  'padding','padding-top','padding-right','padding-bottom','padding-left',
  'border','border-width','border-color','border-style','border-radius',
  'background','background-color','background-image',
  'color','font-family','font-size','font-weight','font-style','line-height','letter-spacing','text-align',
  'flex','flex-direction','flex-wrap','justify-content','align-items','align-self','gap',
  'grid','grid-template-columns','grid-template-rows',
  'overflow','overflow-x','overflow-y','z-index','opacity','transform','transition','box-shadow',
  'cursor','pointer-events','visibility'
];

function renderComputedStyles(node) {
  const header = `<div class="styles-header">Computed Styles</div>`;
  if (!node || node.nodeType !== Node.ELEMENT_NODE) {
    computedStyles.innerHTML = header + `<div style="color:var(--text2);padding:12px 10px;font-size:11px">Select an element</div>`;
    return;
  }

  let cs;
  try { cs = iframe.contentWindow.getComputedStyle(node); } catch { return; }

  const colorRx = /^(#|rgb|hsl|rgba|hsla|oklch)/i;
  const rows = IMPORTANT_PROPS.map(prop => {
    const val = cs.getPropertyValue(prop);
    if (!val || val === 'none' || val === 'normal' || val === 'auto' && ['overflow','overflow-x','overflow-y'].includes(prop)) return null;
    const isColor = colorRx.test(val.trim());
    const valHtml = isColor
      ? `<span class="style-val color-swatch" style="--swatch-color:${val}">${esc(val)}</span>`
      : `<span class="style-val">${esc(val)}</span>`;
    return `<div class="style-rule"><span class="style-prop">${prop}</span>${valHtml}</div>`;
  }).filter(Boolean);

  computedStyles.innerHTML = header + rows.join('');
}

// ── Box Model ──────────────────────────────────────────────────────
function renderBoxModel(node) {
  if (!node || node.nodeType !== Node.ELEMENT_NODE) {
    boxDiagram.innerHTML = `<div style="color:var(--text2);font-size:11px;font-family:var(--font-mono)">No element selected</div>`;
    return;
  }

  let cs, rect;
  try {
    cs = iframe.contentWindow.getComputedStyle(node);
    rect = node.getBoundingClientRect();
  } catch { return; }

  const mt = cs.marginTop, mr = cs.marginRight, mb = cs.marginBottom, ml = cs.marginLeft;
  const pt = cs.paddingTop, pr = cs.paddingRight, pb = cs.paddingBottom, pl = cs.paddingLeft;
  const bt = cs.borderTopWidth, br2 = cs.borderRightWidth, bb = cs.borderBottomWidth, bl = cs.borderLeftWidth;
  const w = Math.round(rect.width), h = Math.round(rect.height);

  boxDiagram.innerHTML = `
<div style="font-size:10px;color:var(--text2);margin-bottom:8px;font-family:var(--font-mono)">Box Model</div>
<div style="position:relative;">
  <div class="box-layer box-margin">
    <span class="box-label" style="color:#c9a87a">margin</span>
    <div style="position:absolute;top:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#c9a87a">${mt}</div>
    <div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#c9a87a">${ml}</div>
    <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#c9a87a">${mr}</div>
    <div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#c9a87a">${mb}</div>

    <div class="box-layer box-border">
      <span class="box-label" style="color:#8ab88a">border</span>
      <div style="position:absolute;top:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#8ab88a">${bt}</div>
      <div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#8ab88a">${bl}</div>
      <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#8ab88a">${br2}</div>
      <div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#8ab88a">${bb}</div>

      <div class="box-layer box-padding">
        <span class="box-label" style="color:#7ab4d0">padding</span>
        <div style="position:absolute;top:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#7ab4d0">${pt}</div>
        <div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#7ab4d0">${pl}</div>
        <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:#7ab4d0">${pr}</div>
        <div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:#7ab4d0">${pb}</div>

        <div class="box-layer box-content">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);text-align:center">
            ${w} × ${h}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

// ── CSS Selector ───────────────────────────────────────────────────
let selectorDebounce = null;
function onSelectorInput(val) {
  clearTimeout(selectorDebounce);
  selectorDebounce = setTimeout(() => runSelector(val), 180);
}

function runSelector(val) {
  // Clear previous highlights
  clearSelectorHighlights();

  if (!val.trim()) {
    cssInput.className = '';
    matchCount.textContent = '—';
    state.selectorMatches = [];
    return;
  }

  try {
    const idoc = iframe.contentDocument;
    if (!idoc) return;
    const matches = Array.from(idoc.querySelectorAll(val));
    state.selectorMatches = matches;

    if (matches.length === 0) {
      cssInput.classList.remove('invalid');
      cssInput.classList.add('valid');
      matchCount.textContent = '0 matches';
      return;
    }

    cssInput.classList.remove('invalid');
    cssInput.classList.add('valid');
    matchCount.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;

    // Highlight in iframe
    matches.forEach(el => {
      el.__origOutlinePrev = el.style.outline;
      el.__origBgPrev = el.style.backgroundColor;
      el.style.outline = '2px solid rgba(255,200,0,0.9)';
      el.classList.add('__phantom_match');
    });

    // Highlight in DOM tree
    document.querySelectorAll('.dom-row').forEach(row => {
      if (row._node && matches.includes(row._node)) {
        row.classList.add('highlighted');
      }
    });

    // Auto-select first match
    if (matches[0]) {
      try { matches[0].scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } catch {}
    }

  } catch(e) {
    cssInput.classList.remove('valid');
    cssInput.classList.add('invalid');
    matchCount.textContent = 'Invalid selector';
    state.selectorMatches = [];
  }
}

function clearSelectorHighlights() {
  try {
    const idoc = iframe.contentDocument;
    if (idoc) {
      idoc.querySelectorAll('.__phantom_match').forEach(el => {
        el.style.outline = el.__origOutlinePrev || '';
        el.style.backgroundColor = el.__origBgPrev || '';
        el.classList.remove('__phantom_match');
      });
    }
  } catch {}
  document.querySelectorAll('.dom-row.highlighted').forEach(r => r.classList.remove('highlighted'));
}

function selectorKey(e) {
  if (e.key === 'Escape') {
    cssInput.value = '';
    clearSelectorHighlights();
    matchCount.textContent = '—';
    cssInput.className = '';
  }
  if (e.key === 'Enter') runSelector(cssInput.value);
}

// ── Element Picker ─────────────────────────────────────────────────
function togglePicker() {
  state.pickerActive = !state.pickerActive;
  $('pick-btn').classList.toggle('active', state.pickerActive);
  $('pick-btn2').style.background = state.pickerActive ? 'rgba(0,136,255,0.2)' : '';
  $('pick-btn2').style.color = state.pickerActive ? 'var(--accent)' : '';
  $('pick-cursor').style.display = state.pickerActive ? 'block' : 'none';
  document.body.style.cursor = state.pickerActive ? 'crosshair' : '';
}

let pickHoverEl = null;

function pickMove(e) {
  if (!state.pickerActive) return;
  const iframe_rect = iframe.getBoundingClientRect();
  const idoc = iframe.contentDocument;
  if (!idoc) return;

  // Get element at point in iframe
  const x = e.clientX - iframe_rect.left;
  const y = e.clientY - iframe_rect.top;

  try {
    const el = idoc.elementFromPoint(x, y);
    if (el && el !== pickHoverEl) {
      if (pickHoverEl && !pickHoverEl.classList.contains('__phantom_selected')) {
        pickHoverEl.style.outline = pickHoverEl.__origPickOutline || '';
      }
      pickHoverEl = el;
      el.__origPickOutline = el.style.outline;
      el.style.outline = '1px dashed rgba(0,200,255,0.8)';
    }
  } catch {}
}

function pickClick(e) {
  if (!state.pickerActive) return;
  const iframe_rect = iframe.getBoundingClientRect();
  const idoc = iframe.contentDocument;
  if (!idoc) return;

  const x = e.clientX - iframe_rect.left;
  const y = e.clientY - iframe_rect.top;

  try {
    const el = idoc.elementFromPoint(x, y);
    if (el) {
      togglePicker();
      // Switch to inspector
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('inspector-panel').classList.add('active');

      // Rebuild DOM tree and try to expand to node
      buildDOMTree();
      setTimeout(() => {
        // Expand the path to this element
        expandToNode(el);
      }, 100);
    }
  } catch {}
}

function expandToNode(targetEl) {
  // Build ancestor path
  const path = [];
  let cur = targetEl;
  while (cur && cur.tagName) { path.unshift(cur); cur = cur.parentElement; }

  // Walk DOM rows and expand matching
  let found = null;
  document.querySelectorAll('.dom-row').forEach(row => {
    if (row._node === targetEl) found = row;
  });

  if (found) {
    found.scrollIntoView({ block: 'center' });
    selectNode(targetEl, found);
  } else {
    // Try clicking toggles down the path
    path.forEach(ancestor => {
      document.querySelectorAll('.dom-row').forEach(row => {
        if (row._node === ancestor) {
          const toggle = row.querySelector('.dom-toggle');
          if (toggle && !toggle.classList.contains('open')) toggle.click();
        }
      });
    });
    setTimeout(() => {
      document.querySelectorAll('.dom-row').forEach(row => {
        if (row._node === targetEl) {
          row.scrollIntoView({ block: 'center' });
          selectNode(targetEl, row);
        }
      });
    }, 60);
  }
}

// ── Panel Resizer ──────────────────────────────────────────────────
function startResize(e) {
  e.preventDefault();
  const app = document.getElementById('app');
  const startX = e.clientX;
  const cols = getComputedStyle(app).gridTemplateColumns.split(' ');

  const onMove = (me) => {
    const delta = me.clientX - startX;
    const totalW = app.offsetWidth;
    const newRight = Math.max(380, Math.min(900, parseInt(cols[1]) - delta));
    app.style.gridTemplateColumns = `1fr ${newRight}px`;
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Prevent gridTemplateColumns including resizer
document.getElementById('app').style.gridTemplateColumns = '1fr 2px 600px';

loadDemo();

  addLog('log', [{t:'string',v:'Tips: Use CSS selector bar to highlight elements • Click Pick to select from page • Run JS in the REPL below'}], [], Date.now());
}, 200);
