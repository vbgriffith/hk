<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDN & API Connection Tester</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e;
    --surface: #0a1520;
    --surface2: #0f1f30;
    --border: #1a3a55;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --warn: #ffaa00;
    --danger: #ff3a5c;
    --muted: #3a6080;
    --text: #c8e8f8;
    --text2: #7aaccc;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .wrapper { position: relative; z-index: 2; max-width: 1600px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    background: rgba(5,10,14,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-main {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }
  .logo-sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--text2);
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 16px;
    min-width: 80px;
  }
  .stat-pill .val {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }
  .stat-pill .lbl {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-top: 2px;
  }
  .stat-pill.ok .val { color: var(--accent2); }
  .stat-pill.fail .val { color: var(--danger); }
  .stat-pill.warn .val { color: var(--warn); }
  .stat-pill.total .val { color: var(--accent); }
  .stat-pill.speed .val { color: #b090ff; }

  /* CONTROLS */
  .controls {
    padding: 20px 0 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 10px 28px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover { background: #40e8ff; box-shadow: 0 0 20px rgba(0,212,255,0.5); }
  .btn-primary:disabled { background: var(--muted); color: var(--surface); cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .filter-group {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); }
  .filter-btn.f-ok.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,157,0.05); }
  .filter-btn.f-fail.active { border-color: var(--danger); color: var(--danger); background: rgba(255,58,92,0.05); }
  .filter-btn.f-warn.active { border-color: var(--warn); color: var(--warn); background: rgba(255,170,0,0.05); }

  /* PROGRESS BAR */
  .progress-track {
    height: 3px;
    background: var(--surface2);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s;
    box-shadow: 0 0 8px var(--accent);
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  /* SEARCH */
  .search-bar {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px 8px 36px;
    outline: none;
    letter-spacing: 1px;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* CATEGORY HEADERS */
  .category-section { margin-bottom: 32px; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .cat-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .cat-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    padding: 2px 8px;
    border: 1px solid var(--border);
  }
  .cat-bar {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .cat-progress {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
  }

  /* GRID */
  .test-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 6px;
  }

  /* CARD */
  .test-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .test-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
    transition: background 0.3s;
  }
  .test-card.ok::before { background: var(--accent2); }
  .test-card.fail::before { background: var(--danger); }
  .test-card.warn::before { background: var(--warn); }
  .test-card.pending::before { background: var(--muted); animation: pulse-bar 1s infinite; }
  .test-card.testing::before { background: var(--accent); animation: pulse-bar 0.5s infinite; }

  @keyframes pulse-bar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .test-card:hover { border-color: var(--accent); background: var(--surface2); }
  .test-card.hidden { display: none; }

  .card-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted);
    transition: background 0.3s;
  }
  .test-card.ok .card-status-dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .test-card.fail .card-status-dot { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .test-card.warn .card-status-dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .test-card.testing .card-status-dot { background: var(--accent); animation: spin-dot 0.8s linear infinite; }

  @keyframes spin-dot {
    0% { box-shadow: 2px 0 0 var(--accent); }
    25% { box-shadow: 0 2px 0 var(--accent); }
    50% { box-shadow: -2px 0 0 var(--accent); }
    75% { box-shadow: 0 -2px 0 var(--accent); }
  }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .card-url {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .card-meta {
    text-align: right;
    flex-shrink: 0;
  }
  .card-time {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    transition: color 0.3s;
  }
  .test-card.ok .card-time { color: var(--accent2); }
  .test-card.fail .card-time { color: var(--danger); }
  .test-card.warn .card-time { color: var(--warn); }
  .card-size {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 16px 0;
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1px;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* SUMMARY ROW */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }
  .summary-item { display: flex; gap: 6px; align-items: center; }
  .summary-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Tooltip */
  .test-card[title]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
  }

  /* Responsive */
  @media(max-width: 600px) {
    .test-grid { grid-template-columns: 1fr; }
    .logo-main { font-size: 20px; }
    .header-stats { gap: 10px; }
    .stat-pill { min-width: 60px; padding: 5px 10px; }
    .stat-pill .val { font-size: 18px; }
  }

  /* Pulse animation for testing state */
  .testing-pulse {
    animation: glow-pulse 1.5s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 5px rgba(0,212,255,0.1); }
    50% { box-shadow: 0 0 20px rgba(0,212,255,0.3); }
  }

  .elapsed {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
</style>
</head>

<header>
  <div class="wrapper">

        <span class="logo-sub">CDN &amp; API Latency Tester</span>
      </div>
      <div class="header-stats">
        <div class="stat-pill total"><span class="val" id="s-total">0</span><span class="lbl">Total</span></div>
        <div class="stat-pill ok"><span class="val" id="s-ok">0</span><span class="lbl">Online</span></div>
        <div class="stat-pill fail"><span class="val" id="s-fail">0</span><span class="lbl">Failed</span></div>
        <div class="stat-pill warn"><span class="val" id="s-warn">0</span><span class="lbl">Slow</span></div>
        <div class="stat-pill speed"><span class="val" id="s-avg">—</span><span class="lbl">Avg ms</span></div>
        <div class="elapsed" id="elapsed-time">00:00</div>
      </div>
    </div>
  </div>
</header>

<div class="wrapper">
  <div class="controls">
    <button class="btn btn-primary" id="btn-run">▶ RUN ALL TESTS</button>
    <button class="btn btn-secondary" id="btn-stop" disabled>■ STOP</button>

    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Filter endpoints...">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn f-ok" data-filter="ok">Online</button>
      <button class="filter-btn f-warn" data-filter="warn">Slow</button>
      <button class="filter-btn f-fail" data-filter="fail">Failed</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
    </div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label" id="progress-label">Ready — <span id="total-count">0</span> endpoints loaded</div>

  <div id="categories-container"></div>
</div>

<footer class="wrapper">
  <span>NETPROBE v1.0 — Tests run via fetch() with no-cors mode</span>
  <span id="last-run">—</span>
  <span>Slow threshold: &gt;800ms · Timeout: 8s</span>
</footer>

(function preloadLinks() {
  ENDPOINTS.forEach(ep => {
    try {
      const link = document.createElement('link');
      link.rel = 'preconnect';
      const url = new URL(ep.url);
      link.href = url.origin;
      link.crossOrigin = 'anonymous';
      document.head.appendChild(link);
    } catch(e) {}
  });
})();

document.getElementById('s-total').textContent = ENDPOINTS.length;
document.getElementById('total-count').textContent = ENDPOINTS.length;

function buildUI() {
  const container = document.getElementById('categories-container');
  container.innerHTML = '';

  const byCategory = {};
  ENDPOINTS.forEach((ep, i) => {
    ep._id = i;
    if (!byCategory[ep.cat]) byCategory[ep.cat] = [];
    byCategory[ep.cat].push(ep);
  });

  for (const [cat, endpoints] of Object.entries(byCategory)) {
    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = `cat-${cat.replace(/\s+/g,'_')}`;

    section.innerHTML = `
      <div class="cat-header">
        <span class="cat-name">${cat}</span>
        <span class="cat-count" id="count-${cat.replace(/\s+/g,'_')}">${endpoints.length} endpoints</span>
        <div class="cat-bar"></div>
        <span class="cat-progress" id="prog-${cat.replace(/\s+/g,'_')}">—</span>
      </div>
      <div class="test-grid" id="grid-${cat.replace(/\s+/g,'_')}"></div>
    `;

    const grid = section.querySelector('.test-grid');
    endpoints.forEach(ep => {
      const card = document.createElement('div');
      card.className = 'test-card pending';
      card.id = `card-${ep._id}`;
      card.dataset.cat = cat;
      card.dataset.name = ep.name.toLowerCase();
      card.dataset.url = ep.url.toLowerCase();

      const shortUrl = ep.url.replace('https://','').replace('http://','');
      card.innerHTML = `
        <div class="card-status-dot"></div>
        <div class="card-info">
          <div class="card-name">${ep.name}</div>
          <div class="card-url">${shortUrl}</div>
        </div>
        <div class="card-meta">
          <div class="card-time" id="time-${ep._id}">—</div>
          <div class="card-size" id="size-${ep._id}">—</div>
        </div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(section);
  }
}

// =====================================================================
// TEST RUNNER
// =====================================================================
async function testEndpoint(ep) {
  const card = document.getElementById(`card-${ep._id}`);
  const timeEl = document.getElementById(`time-${ep._id}`);
  const sizeEl = document.getElementById(`size-${ep._id}`);

  card.className = 'test-card testing';

  const controller = new AbortController();
  state.abortControllers.push(controller);

  const TIMEOUT = 8000;
  const SLOW_THRESHOLD = 800;

  const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);
  const start = performance.now();

  try {
    const response = await fetch(ep.url, {
      method: 'GET',
      mode: 'no-cors',
      cache: 'no-store',
      signal: controller.signal,
    });

    clearTimeout(timeoutId);
    const elapsed = Math.round(performance.now() - start);

    // With no-cors, response.type === 'opaque', status is always 0
    // If we got here without throwing, connection succeeded
    const status = response.status === 0 ? 'opaque' : response.status;
    const ok = true; // no-cors success means reachable

    const contentLen = response.headers.get ? response.headers.get('content-length') : null;
    const sizeStr = contentLen ? `${Math.round(contentLen/1024)}KB` : '—';

    const isWarn = elapsed > SLOW_THRESHOLD;
    card.className = `test-card ${isWarn ? 'warn' : 'ok'}`;
    timeEl.textContent = `${elapsed}ms`;
    sizeEl.textContent = sizeStr;

    state.results[ep._id] = { status: isWarn ? 'warn' : 'ok', elapsed, url: ep.url, name: ep.name, cat: ep.cat };

  } catch (err) {
    clearTimeout(timeoutId);
    const elapsed = Math.round(performance.now() - start);

    let failReason = '✕ fail';
    if (err.name === 'AbortError') failReason = '⏱ timeout';

    card.className = 'test-card fail';
    timeEl.textContent = failReason;
    sizeEl.textContent = `${elapsed}ms`;

    state.results[ep._id] = { status: 'fail', elapsed, url: ep.url, name: ep.name, cat: ep.cat };
  }

  applyVisibility(document.getElementById(`card-${ep._id}`));
  updateStats();
  updateProgress();
}

// =====================================================================
// RUN ALL
// =====================================================================
async function runAll() {
  state.results = {};
  state.abortControllers = [];
  state.running = true;
  state.startTime = Date.now();

  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').disabled = false;

  // Reset all cards
  ENDPOINTS.forEach(ep => {
    const card = document.getElementById(`card-${ep._id}`);
    card.className = 'test-card pending';
    const timeEl = document.getElementById(`time-${ep._id}`);
    const sizeEl = document.getElementById(`size-${ep._id}`);
    timeEl.textContent = '—';
    sizeEl.textContent = '—';
  });

  document.getElementById('s-ok').textContent = '0';
  document.getElementById('s-fail').textContent = '0';
  document.getElementById('s-warn').textContent = '0';
  document.getElementById('s-avg').textContent = '—';
  document.getElementById('progress-fill').style.width = '0%';

  // Start timer
  state.timerInterval = setInterval(updateElapsed, 500);

  // Run in parallel batches of 30
  const BATCH = 30;
  for (let i = 0; i < ENDPOINTS.length; i += BATCH) {
    if (!state.running) break;
    const batch = ENDPOINTS.slice(i, i + BATCH);
    await Promise.allSettled(batch.map(ep => testEndpoint(ep)));
  }

  state.running = false;
  clearInterval(state.timerInterval);
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('last-run').textContent = `Last run: ${new Date().toLocaleTimeString()}`;
  document.getElementById('progress-label').textContent = `Complete — ${ENDPOINTS.length} endpoints tested`;
}

function stopTests() {
  state.running = false;
  state.abortControllers.forEach(c => { try { c.abort(); } catch(e){} });
  clearInterval(state.timerInterval);
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('progress-label').textContent = `Stopped — ${Object.keys(state.results).length} tested`;
}

// =====================================================================
// STATS & UI
// =====================================================================
function updateStats() {
  const vals = Object.values(state.results);
  const ok = vals.filter(v => v.status === 'ok').length;
  const fail = vals.filter(v => v.status === 'fail').length;
  const warn = vals.filter(v => v.status === 'warn').length;
  const times = vals.filter(v => v.status !== 'fail').map(v => v.elapsed);
  const avg = times.length ? Math.round(times.reduce((a,b) => a+b, 0) / times.length) : null;

  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-fail').textContent = fail;
  document.getElementById('s-warn').textContent = warn;
  document.getElementById('s-avg').textContent = avg !== null ? avg : '—';
}

function updateProgress() {
  const tested = Object.keys(state.results).length;
  const pct = Math.round((tested / ENDPOINTS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Testing… ${tested} / ${ENDPOINTS.length} (${pct}%)`;
}

function updateElapsed() {
  if (!state.startTime) return;
  const elapsed = Date.now() - state.startTime;
  const s = Math.floor((elapsed / 1000) % 60).toString().padStart(2,'0');
  const m = Math.floor(elapsed / 60000).toString().padStart(2,'0');
  document.getElementById('elapsed-time').textContent = `${m}:${s}`;
}

// =====================================================================
// FILTER & SEARCH
// =====================================================================
function applyVisibility(card) {
  const filter = state.filter;
  const search = state.searchTerm.toLowerCase();
  const result = state.results[parseInt(card.id.split('-')[1])];
  const currentStatus = result ? result.status : 'pending';

  let show = true;

  if (filter !== 'all' && currentStatus !== filter) show = false;

  if (search) {
    const name = card.dataset.name || '';
    const url = card.dataset.url || '';
    const cat = (card.dataset.cat || '').toLowerCase();
    if (!name.includes(search) && !url.includes(search) && !cat.includes(search)) show = false;
  }

  card.classList.toggle('hidden', !show);
}

function applyAllFilters() {
  document.querySelectorAll('.test-card').forEach(card => applyVisibility(card));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.filter = btn.dataset.filter;
    applyAllFilters();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  state.searchTerm = e.target.value;
  applyAllFilters();
});

// =====================================================================
// EXPORT CSV
// =====================================================================
document.getElementById('btn-export').addEventListener('click', () => {
  const rows = [['Name','Category','URL','Status','Time (ms)']];
  ENDPOINTS.forEach(ep => {
    const r = state.results[ep._id];
    rows.push([
      `"${ep.name}"`,
      `"${ep.cat}"`,
      `"${ep.url}"`,
      r ? r.status : 'pending',
      r ? r.elapsed : ''
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `netprobe-${Date.now()}.csv`;
  a.click();
});

// =====================================================================
// WIRE BUTTONS
// =====================================================================
document.getElementById('btn-run').addEventListener('click', runAll);
document.getElementById('btn-stop').addEventListener('click', stopTests);

// =====================================================================
// INIT
// =====================================================================
buildUI();
document.getElementById('s-total').textContent = ENDPOINTS.length;
document.getElementById('total-count').textContent = ENDPOINTS.length;
</script>
</body>
